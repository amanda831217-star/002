<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工程出工管理平台</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#172033;
      --muted:#64748b;
      --line:#dbe3ef;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --danger:#dc2626;
      --success:#16a34a;
      --disabled:#cbd5e1;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      max-width:880px;
      margin:0 auto;
      padding:16px;
      padding-bottom:80px;
    }

    .title{
      font-size:24px;
      font-weight:900;
      margin:8px 0 4px;
    }

    .subtitle{
      color:var(--muted);
      font-size:13px;
      margin-bottom:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 6px 18px rgba(15,23,42,.06);
    }

    .section-title{
      font-size:18px;
      font-weight:900;
      margin:6px 0 12px;
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    label{
      font-size:13px;
      color:#374151;
      font-weight:800;
      display:block;
      margin-bottom:6px;
    }

    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:82px;
      resize:vertical;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    button{
      border:0;
      border-radius:14px;
      padding:13px 14px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      width:100%;
      background:var(--primary);
      color:#fff;
    }

    button:hover{background:var(--primary-dark)}

    button:disabled{
      background:var(--disabled);
      color:#64748b;
      cursor:not-allowed;
    }

    .btn-secondary{
      background:#e8eefc;
      color:#1e40af;
    }

    .btn-secondary:hover{background:#dbe7ff}

    .btn-danger{
      background:#fee2e2;
      color:#991b1b;
    }

    .btn-danger:hover{background:#fecaca}

    .btn-ghost{
      background:#f1f5f9;
      color:#334155;
    }

    .hide{display:none!important}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .topbar button{
      width:auto;
      padding:9px 12px;
      font-size:13px;
    }

    .nav{
      display:grid;
      gap:10px;
    }

    .nav button{
      text-align:left;
      padding:16px;
    }

    .msg{
      padding:12px;
      border-radius:14px;
      font-size:14px;
      margin-bottom:12px;
      display:none;
      white-space:pre-wrap;
    }

    .msg.show{display:block}

    .msg.ok{
      background:#dcfce7;
      color:#166534;
      border:1px solid #86efac;
    }

    .msg.err{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .msg.info{
      background:#eff6ff;
      color:#1e40af;
      border:1px solid #bfdbfe;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:12px;
    }

    .tabs button{
      padding:10px;
      font-size:13px;
      background:#f1f5f9;
      color:#334155;
    }

    .tabs button.active{
      background:var(--primary);
      color:#fff;
    }

    .stat-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .stat .cap{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .stat .num{
      font-size:24px;
      font-weight:900;
      margin-top:4px;
    }

    .week-wrap{
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }

    table{
      border-collapse:collapse;
      min-width:850px;
      width:100%;
      font-size:13px;
    }

    th,td{
      border:1px solid var(--line);
      padding:10px;
      vertical-align:top;
      min-width:105px;
    }

    th{
      background:#f8fafc;
      font-weight:900;
    }

    .project-cell{
      min-width:140px;
      font-weight:900;
      background:#f8fafc;
      position:sticky;
      left:0;
      z-index:2;
    }

    .day-cell{
      min-height:60px;
      cursor:pointer;
      background:#fff;
    }

    .day-cell:hover{background:#eff6ff}

    .person-chip{
      display:inline-block;
      background:#e0f2fe;
      color:#075985;
      border-radius:999px;
      padding:4px 7px;
      margin:2px;
      font-size:12px;
      font-weight:800;
    }

    .record{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
      background:#fff;
    }

    .record b{
      display:block;
      margin-bottom:5px;
    }

    .summary-block{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
      background:#fff;
    }

    .summary-title{
      font-size:16px;
      font-weight:900;
      margin-bottom:6px;
    }

    .summary-meta{
      font-size:13px;
      color:#334155;
      margin-bottom:8px;
      line-height:1.7;
    }

    .mini-table{
      min-width:100%;
      width:100%;
      font-size:13px;
    }

    .mini-table th,.mini-table td{
      min-width:auto;
      padding:8px;
    }

    .pill{
      display:inline-block;
      background:#eef2ff;
      color:#3730a3;
      border-radius:999px;
      padding:4px 8px;
      margin:2px;
      font-size:12px;
      font-weight:800;
    }

    .hour-box{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      line-height:1.8;
      font-size:14px;
    }
  </style>
</head>

<body>
<div class="app">
  <div class="title">工程出工管理平台</div>
  <div class="subtitle" id="todayText"></div>
  <div id="globalMsg" class="msg"></div>

  <section id="loginPage" class="card">
    <div class="section-title">管理員登入</div>
    <div class="grid">
      <div>
        <label>帳號</label>
        <input id="loginUsername" autocomplete="username" />
      </div>
      <div>
        <label>密碼</label>
        <input id="loginPassword" type="password" autocomplete="current-password" />
      </div>
      <button id="loginBtn" onclick="login()">登入</button>
    </div>
  </section>

  <section id="homePage" class="hide">
    <div class="card">
      <div class="topbar">
        <div>
          <b id="loginName"></b>
          <div class="small" id="loginRole"></div>
        </div>
        <button class="btn-ghost" onclick="logout()">登出</button>
      </div>

      <div class="nav">
        <button onclick="openPrePage()">① 每週預排填報</button>
        <button onclick="openActualPage()">② 實際填報修正</button>
        <button onclick="openDashboard()">③ 出工總覽</button>
        <button onclick="openAdmin()">④ 後台管理</button>
      </div>
    </div>
  </section>

  <section id="prePage" class="hide">
    <div class="card">
      <div class="topbar">
        <div class="section-title">每週預排填報</div>
        <button class="btn-ghost" onclick="openPage('homePage')">返回</button>
      </div>

      <div class="msg info show">
        預排儲存後，系統會自動同步一筆到「實際填報」。若沒有變更，財務與人資直接以實際填報資料為準。
      </div>

      <div class="grid">
        <div>
          <label>出工日期</label>
          <input id="preDate" type="date" onchange="validatePreForm()" />
        </div>

        <div>
          <label>人員名稱</label>
          <select id="preUser" onchange="validatePreForm()"></select>
        </div>

        <button class="btn-secondary" onclick="showAdminPanelFromPre('memberPanel')">＋新增人員</button>

        <div>
          <label>案場</label>
          <select id="preProject" onchange="validatePreForm()"></select>
        </div>

        <button class="btn-secondary" onclick="showAdminPanelFromPre('projectPanel')">＋新增案場</button>

        <div>
          <label>車輛</label>
          <select id="preVehicle" onchange="toggleTempVehicle('pre'); validatePreForm()"></select>
        </div>

        <div id="preTempVehicleBox" class="hide">
          <label>臨時車號</label>
          <input id="preTempPlateNo" oninput="validatePreForm()" placeholder="例：ABC-1234" />
        </div>

        <div class="grid-2">
          <div>
            <label>開始時間</label>
            <select id="preStart" onchange="updateHours('pre'); validatePreForm()"></select>
          </div>
          <div>
            <label>結束時間</label>
            <select id="preEnd" onchange="updateHours('pre'); validatePreForm()"></select>
          </div>
        </div>

        <div class="hour-box">
          原始時數：<b id="preGross">0.0</b> 小時<br>
          午休扣除：<b id="preLunch">0.0</b> 小時<br>
          預排工時：<b id="preNet">0.0</b> 小時
        </div>

        <div>
          <label>工作類型</label>
          <select id="preWorkType" onchange="validatePreForm()">
            <option value="">請選擇</option>
            <option>施工</option>
            <option>查驗</option>
            <option>測試</option>
            <option>維修</option>
            <option>現場協調</option>
            <option>其他</option>
          </select>
        </div>

        <div>
          <label>工作內容</label>
          <textarea id="preNote" oninput="validatePreForm()"></textarea>
        </div>

        <button id="savePreBtn" onclick="savePreSchedule()" disabled>儲存預排並同步實際填報</button>
      </div>
    </div>
  </section>

  <section id="actualPage" class="hide">
    <div class="card">
      <div class="topbar">
        <div class="section-title">實際填報修正</div>
        <button class="btn-ghost" onclick="openPage('homePage')">返回</button>
      </div>

      <div class="grid">
        <div>
          <label>查詢日期</label>
          <input id="actualSearchDate" type="date" />
        </div>
        <div>
          <label>人員</label>
          <select id="actualSearchUser"></select>
        </div>
        <div>
          <label>案場</label>
          <select id="actualSearchProject"></select>
        </div>
        <button onclick="loadActualRecords()">查詢實際填報資料</button>
      </div>
    </div>

    <div id="actualListCard" class="card hide">
      <div class="section-title">實際填報清單</div>
      <div id="actualList"></div>
    </div>

    <div id="actualEditCard" class="card hide">
      <div class="topbar">
        <div class="section-title">編輯實際出工</div>
        <button class="btn-ghost" onclick="closeActualEdit()">關閉</button>
      </div>

      <div class="grid">
        <input id="editRecordId" type="hidden" />

        <div>
          <label>人員名稱</label>
          <select id="editUser" onchange="validateEditForm()"></select>
        </div>

        <div>
          <label>出工日期</label>
          <input id="editDate" type="date" onchange="validateEditForm()" />
        </div>

        <div>
          <label>案場</label>
          <select id="editProject" onchange="validateEditForm()"></select>
        </div>

        <div>
          <label>車輛</label>
          <select id="editVehicle" onchange="toggleTempVehicle('edit'); validateEditForm()"></select>
        </div>

        <div id="editTempVehicleBox" class="hide">
          <label>臨時車號</label>
          <input id="editTempPlateNo" oninput="validateEditForm()" />
        </div>

        <div class="grid-2">
          <div>
            <label>開始時間</label>
            <select id="editStart" onchange="updateHours('edit'); validateEditForm()"></select>
          </div>
          <div>
            <label>結束時間</label>
            <select id="editEnd" onchange="updateHours('edit'); validateEditForm()"></select>
          </div>
        </div>

        <div class="hour-box">
          原始時數：<b id="editGross">0.0</b> 小時<br>
          午休扣除：<b id="editLunch">0.0</b> 小時<br>
          實際工時：<b id="editNet">0.0</b> 小時
        </div>

        <div>
          <label>工作類型</label>
          <select id="editWorkType" onchange="validateEditForm()">
            <option value="">請選擇</option>
            <option>施工</option>
            <option>查驗</option>
            <option>測試</option>
            <option>維修</option>
            <option>現場協調</option>
            <option>其他</option>
          </select>
        </div>

        <div>
          <label>工作內容</label>
          <textarea id="editNote" oninput="validateEditForm()"></textarea>
        </div>

        <div>
          <label>變更原因</label>
          <textarea id="editReason" oninput="validateEditForm()"></textarea>
        </div>

        <button id="saveEditBtn" onclick="updateActualRecord()" disabled>儲存實際變更</button>
      </div>
    </div>
  </section>

  <section id="dashboardPage" class="hide">
    <div class="card">
      <div class="topbar">
        <div class="section-title">出工總覽</div>
        <button class="btn-ghost" onclick="openPage('homePage')">返回</button>
      </div>

      <div class="tabs">
        <button id="dashBoardTab" class="active" onclick="showDashboardTab('board')">白板</button>
        <button id="dashProjectTab" onclick="showDashboardTab('project')">案場統計</button>
        <button id="dashPersonTab" onclick="showDashboardTab('person')">人員統計</button>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="cap">本週人次</div><div class="num" id="weekCount">0</div></div>
        <div class="stat"><div class="cap">本週工時</div><div class="num" id="weekHours">0</div></div>
        <div class="stat"><div class="cap">本月人次</div><div class="num" id="monthCount">0</div></div>
        <div class="stat"><div class="cap">本月工時</div><div class="num" id="monthHours">0</div></div>
        <div class="stat"><div class="cap">本年人次</div><div class="num" id="yearCount">0</div></div>
        <div class="stat"><div class="cap">本年工時</div><div class="num" id="yearHours">0</div></div>
      </div>
    </div>

    <div id="boardPanel">
      <div class="card">
        <div class="tabs">
          <button id="dashActualBtn" class="active" onclick="setDashSource('actual')">實際資料</button>
          <button id="dashPreBtn" onclick="setDashSource('pre')">預排資料</button>
          <button onclick="loadWeeklyOverview()">更新</button>
        </div>

        <div class="grid-2">
          <button class="btn-secondary" onclick="changeWeek(-7)">上一週</button>
          <button class="btn-secondary" onclick="changeWeek(7)">下一週</button>
        </div>

        <div class="divider"></div>

        <div class="section-title" id="weekTitle">週排程表</div>
        <div class="small">可左右滑動；點擊格子可查看人員、工時、車號與工作內容。</div>
        <div class="week-wrap" id="weekTableWrap"></div>
      </div>

      <div id="detailCard" class="card hide">
        <div class="topbar">
          <div class="section-title" id="detailTitle">明細</div>
          <button class="btn-ghost" onclick="hideDetail()">關閉</button>
        </div>
        <div id="detailContent"></div>
      </div>
    </div>

    <div id="projectPanelDash" class="hide">
      <div class="card">
        <div class="section-title">案場別出工統計</div>
        <div class="tabs">
          <button id="projectWeekBtn" class="active" onclick="setProjectSummaryMode('week')">本週</button>
          <button id="projectMonthBtn" onclick="setProjectSummaryMode('month')">本月</button>
          <button id="projectYearBtn" onclick="setProjectSummaryMode('year')">本年</button>
        </div>
        <div id="projectSummary"></div>
      </div>
    </div>

    <div id="personPanelDash" class="hide">
      <div class="card">
        <div class="section-title">人員出工統計</div>
        <div class="tabs">
          <button id="personWeekBtn" class="active" onclick="setPersonSummaryMode('week')">本週</button>
          <button id="personMonthBtn" onclick="setPersonSummaryMode('month')">本月</button>
          <button id="personYearBtn" onclick="setPersonSummaryMode('year')">本年</button>
        </div>
        <div id="personSummary"></div>
      </div>
    </div>
  </section>

  <section id="adminPage" class="hide">
    <div class="card">
      <div class="topbar">
        <div class="section-title">後台管理</div>
        <button class="btn-ghost" onclick="openPage('homePage')">返回</button>
      </div>

      <div class="nav">
        <button onclick="showAdminPanel('memberPanel')">新增人員</button>
        <button onclick="showAdminPanel('projectPanel')">新增案場</button>
        <button onclick="showAdminPanel('vehiclePanel')">新增車輛</button>
        <button onclick="showAdminPanel('adminUserPanel')">新增管理帳號</button>
      </div>
    </div>

    <div id="memberPanel" class="card hide admin-panel">
      <div class="section-title">新增人員</div>
      <div class="grid">
        <input id="newMemberName" placeholder="姓名" />
        <input id="newMemberDept" placeholder="部門，例如 工程部" />
        <button onclick="adminAddMember()">新增人員</button>
      </div>
    </div>

    <div id="projectPanel" class="card hide admin-panel">
      <div class="section-title">新增案場</div>
      <div class="grid">
        <input id="newProjectShort" placeholder="案場簡稱" />
        <textarea id="newProjectFull" placeholder="完整案名"></textarea>
        <input id="newProjectLocation" placeholder="地點" />
        <button onclick="adminAddProject()">新增案場</button>
      </div>
    </div>

    <div id="vehiclePanel" class="card hide admin-panel">
      <div class="section-title">新增車輛</div>
      <div class="grid">
        <input id="newPlateNo" placeholder="車號，例如 R001" />
        <input id="newVehicleName" placeholder="車輛名稱，例如 公司車" />
        <input id="newVehicleType" placeholder="車種，例如 小客車 / 工程車" />
        <button onclick="adminAddVehicle()">新增車輛</button>
      </div>
    </div>

    <div id="adminUserPanel" class="card hide admin-panel">
      <div class="section-title">新增管理帳號</div>
      <div class="grid">
        <input id="newAdminUsername" placeholder="帳號" />
        <input id="newAdminPassword" placeholder="密碼" />
        <input id="newAdminName" placeholder="姓名" />
        <input id="newAdminDept" placeholder="部門" />
        <button onclick="adminAddUser()">新增管理帳號</button>
      </div>
    </div>
  </section>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyaRnoq4kGWhs-Cl1xi6qe5F0RJ0EWBj6gbHwvKLJZs4ljO15lr6HEzJjKkq6ZUJmkNyQ/exec';

  const state = {
    token: localStorage.getItem('dispatch_token') || '',
    user: JSON.parse(localStorage.getItem('dispatch_user') || 'null'),
    projects: [],
    vehicles: [],
    users: [],
    dashSource: 'actual',
    currentWeekStart: getMondayString(new Date()),
    projectSummaryMode: 'week',
    personSummaryMode: 'week'
  };

  document.addEventListener('DOMContentLoaded', init);

  function init(){
    setTodayText();
    fillTimeOptions();
    setDefaultDates();

    if(state.token && state.user){
      showLoggedIn();
      loadMasterData();
    }else{
      openPage('loginPage');
    }
  }

  function setTodayText(){
    const d = new Date();
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('todayText').textContent =
      `今日：${formatDate(d)}（週${days[d.getDay()]}）`;
  }

  function setDefaultDates(){
    const today = formatDate(new Date());
    const nextWeek = new Date();
    nextWeek.setDate(nextWeek.getDate() + 7);

    document.getElementById('preDate').value = formatDate(nextWeek);
    document.getElementById('actualSearchDate').value = today;
  }

  function openPage(id){
    ['loginPage','homePage','prePage','actualPage','dashboardPage','adminPage'].forEach(x=>{
      document.getElementById(x).classList.add('hide');
    });
    document.getElementById(id).classList.remove('hide');
    clearMsg();
  }

  function showLoggedIn(){
    openPage('homePage');
    document.getElementById('loginName').textContent = `登入人員：${state.user.display_name}`;
    document.getElementById('loginRole').textContent = `角色：${state.user.role}`;
  }

  async function api(action, payload = {}){
    if(!API_URL || API_URL.includes('貼你的')){
      throw new Error('API_URL_NOT_SET');
    }

    const res = await fetch(API_URL, {
      method:'POST',
      mode:'cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...payload })
    });

    const json = await res.json();

  function calcHours(start,end){
    if(!start || !end) return { gross:0, lunch:0, net:0, valid:false };

    const s = toMinutes(start);
    const e = toMinutes(end);

    if(e <= s) return { gross:0, lunch:0, net:0, valid:false };

    const lunchStart = toMinutes('12:00');
    const lunchEnd = toMinutes('13:00');
    const gross = (e - s) / 60;
    const lunch = Math.max(0, Math.min(e,lunchEnd) - Math.max(s,lunchStart)) / 60;
    const net = gross - lunch;

    return {
      gross: round1(gross),
      lunch: round1(lunch),
      net: round1(net),
      valid: true
    };
  }

  function updateHours(type){
    const h = calcHours(value(`${type}Start`), value(`${type}End`));
    setText(`${type}Gross`, h.gross.toFixed(1));
    setText(`${type}Lunch`, h.lunch.toFixed(1));
    setText(`${type}Net`, h.net.toFixed(1));
  }

  function renderWeekTable(data){
    setText('weekTitle', `週排程表｜${data.week_start} ～ ${data.week_end}`);

    const days = ['週一','週二','週三','週四','週五','週六','週日'];

    let html = '<table><thead><tr>';
    html += '<th class="project-cell">案場</th>';

    data.dates.forEach((date,i)=>{
      html += `<th>${days[i]}<br>${date.slice(5)}</th>`;
    });

    html += '</tr></thead><tbody>';

    if(!data.projects.length){
      html += '<tr><td colspan="8">目前此週尚無資料。</td></tr>';
    }else{
      data.projects.forEach(p=>{
        html += '<tr>';
        html += `<td class="project-cell">${escapeHtml(p.project_id)}<br><span class="small">${escapeHtml(p.project_short_name)}</span></td>`;

        data.dates.forEach(date=>{
          const cell = p.days[date];
          const chips = cell.records.map(r=>`<span class="person-chip">${escapeHtml(r.display_name)}</span>`).join('');

          html += `
            <td class="day-cell" onclick='showDetail(${JSON.stringify(date)},${JSON.stringify(p.project_id)})'>
              ${chips || '<span class="small">—</span>'}
              ${cell.count ? `<div class="small">${cell.count}人次｜${cell.hours}hr</div>` : ''}
            </td>
          `;
        });

        html += '</tr>';
      });
    }

    html += '</tbody></table>';

    document.getElementById('weekTableWrap').innerHTML = html;
    window.__weekData = data;
  }

  function value(id){
    const el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }

  function setValue(id,v){
    const el = document.getElementById(id);
    if(el) el.value = v || '';
  }

  function setText(id,v){
    const el = document.getElementById(id);
    if(el) el.textContent = v;
  }

  function toMinutes(t){
    const [h,m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function round1(n){
    return Math.round(n * 10) / 10;
  }

  function formatDate(d){
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function parseDate(s){
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y,m-1,d);
  }

  function getMondayString(date){
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return formatDate(d);
  }

  function dateKey(s){
    return String(s || '').replaceAll('/','-').slice(0,10);
  }

  function pad(n){
    return String(n).padStart(2,'0');
  }

  function escapeHtml(str){
    return String(str ?? '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }

  function errorText(code){
    const map = {
      API_URL_NOT_SET:'尚未設定 Apps Script API 網址。',
      MISSING_ACTION:'系統缺少 action。',
      INVALID_ACTION:'系統功能不存在，請確認 Apps Script 是否已部署新版。',
      INVALID_JSON:'資料格式錯誤。',
      LOGIN_FAILED:'帳號或密碼錯誤，或帳號已停用。',
      INVALID_TOKEN:'登入已失效，請重新登入。',
      ADMIN_ONLY:'此功能限管理員使用。',
      PROJECT_NOT_FOUND:'找不到案場，或案場已停用。',
      VEHICLE_NOT_FOUND:'找不到車輛，或車輛已停用。',
      USER_NOT_FOUND:'找不到人員，或人員已停用。',
      INVALID_TIME_RANGE:'結束時間不可早於或等於開始時間。',
      INVALID_TIME_STEP:'時間只能選整點或半點。',
      INVALID_HOUR_DECIMAL:'工時格式不符合 .0 或 .5。',
      USERNAME_EXISTS:'帳號已存在。',
      INVALID_ROLE:'角色錯誤。',
      INVALID_TARGET:'管理目標錯誤。',
      INVALID_STATUS:'狀態錯誤。',
      NOT_FOUND:'找不到資料。',
      ACTUAL_RECORD_NOT_FOUND:'找不到要修改的實際填報資料。',
      MISSING_temp_plate_no:'請輸入臨時車號。'
    };

    if(code && code.startsWith('MISSING_')){
      return `缺少必要欄位：${code.replace('MISSING_','')}`;
    }

    return map[code] || `系統錯誤：${code}`;
  }
</script>
